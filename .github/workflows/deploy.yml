name: 🚀 Deploy Frontend to Orange Pi

on:
  push:
    branches:
      - master

concurrency:
  group: production
  cancel-in-progress: true

  
jobs:
  deploy:
    name: Deploy to Production
    runs-on: self-hosted  # Changed from ubuntu-latest
    
    steps:
      - name: 📦 Checkout Code
        uses: actions/checkout@v4
      
      - name: 🚀 Deploy Frontend
        run: |
          set -e
          
          echo "🚀 Starting Frontend Deployment"
          
          # Build Docker image
          docker build \
            -t em-construcao:latest .
          
          # Stop old container
          docker stop em-construcao || true
          docker rm em-construcao || true
          
          # Run new container
          docker run -d \
            -p 3005:3005 \
            --name em-construcao \
            --restart unless-stopped \
            em-construcao:latest
          
          # Verify
          sleep 5
          
          if docker ps | grep -q em-construcao; then
            echo "✅ Frontend deployed!"
            echo "🌐 App: https://hardman.app.br"
          else
            echo "❌ Failed!"
            exit 1
          fi
          
          docker image prune -f
